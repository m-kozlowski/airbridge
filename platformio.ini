[env:m5stamp-pico]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = m5stamp-pico
framework = arduino
monitor_speed = 115200
upload_speed = 921600
extra_scripts =
    pre:generate_web_ui.py
    post:provision.py

lib_deps =
    h2zero/NimBLE-Arduino
    https://github.com/ESP32Async/ESPAsyncWebServer

board_build.partitions = partitions.csv

board_build.arduino.loop_stack_size = 8192

build_flags =
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=0
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_MAX_BONDS=3

build_src_filter =
    +<*>
    -<migrate_main.cpp>
    -<migrate.cpp>

build_src_flags =
    !bash version.sh

[env:ota]
extends = env:m5stamp-pico
upload_protocol = espota
upload_port = airbridge
upload_flags = --auth=${sysenv.AIRBRIDGE_OTA_PASS}

[env:migrate]
extends = env:m5stamp-pico
board_build.partitions = partitions_v1.csv
extra_scripts =
    pre:generate_target_ptable.py
    post:provision.py
build_flags =
    -DFIRMWARE_MIGRATE=1
build_src_filter =
    +<migrate_main.cpp>
    +<app_config.cpp>
    +<debug_log.cpp>
    +<uart_arbiter.cpp>
    +<qframe.cpp>
    +<wifi.cpp>
    +<airbridge_ota.cpp>
    +<migrate.cpp>

[env:migrate-ota]
extends = env:migrate
upload_protocol = espota
upload_port = airbridge
upload_flags = --auth=${sysenv.AIRBRIDGE_OTA_PASS}
